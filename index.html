<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sommerferie 2026 - Familie-roadtrip</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<!-- Tailwind CSS play-cdn -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        petrol: '#1B4F72',
        sand: '#F5DEB3',
        cream: '#FBF5E6',
        sunshine: '#F4A621',
        charcoal: '#2C3E50',
        success: '#27AE60',
        muted: '#607080',
      },
      fontFamily: {
        heading: ['Playfair Display', 'serif'],
        body: ['Inter', 'sans-serif'],
      },
    },
  },
}
</script>

<!-- Alpine.js -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  [x-cloak] { display: none !important; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; }
</style>
</head>

<body class="bg-cream text-charcoal min-h-screen overflow-x-hidden">

<!-- ===== ALPINE.JS APP ROOT ===== -->
<div x-data="ferieApp()" x-init="init()">

  <!-- ===== SEKSJON: NAVIGASJON ===== -->
  <nav class="sticky top-0 z-50 bg-petrol/95 backdrop-blur-sm shadow-md">
    <div class="max-w-5xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-14">
        <!-- Logo -->
        <a href="#" class="font-heading text-white text-lg font-bold tracking-wide">Sommerferie 2026</a>

        <!-- Desktop-meny -->
        <div class="hidden lg:flex items-center gap-1">
          <template x-for="section in sections" :key="section.id">
            <a :href="'#' + section.id"
               @click.prevent="scrollTo(section.id)"
               class="px-4 py-2 text-sm text-white/80 hover:text-white transition-colors relative"
               :class="activeSection === section.id && 'text-white font-medium'">
              <span x-text="section.label"></span>
              <span x-show="activeSection === section.id"
                    class="absolute bottom-0 left-2 right-2 h-0.5 bg-sunshine rounded-full"></span>
            </a>
          </template>
        </div>

        <!-- Hamburgermeny-knapp (mobil) -->
        <button @click="mobileMenuOpen = !mobileMenuOpen"
                class="lg:hidden text-white p-2 -mr-2"
                :aria-expanded="mobileMenuOpen"
                aria-label="Meny">
          <svg x-show="!mobileMenuOpen" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg x-show="mobileMenuOpen" x-cloak class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Mobilmeny -->
      <div x-show="mobileMenuOpen" x-cloak
           x-transition:enter="transition ease-out duration-200"
           x-transition:enter-start="opacity-0 -translate-y-2"
           x-transition:enter-end="opacity-100 translate-y-0"
           x-transition:leave="transition ease-in duration-150"
           x-transition:leave-start="opacity-100 translate-y-0"
           x-transition:leave-end="opacity-0 -translate-y-2"
           class="lg:hidden pb-3 border-t border-white/10">
        <template x-for="section in sections" :key="section.id">
          <a :href="'#' + section.id"
             @click.prevent="scrollTo(section.id); mobileMenuOpen = false"
             class="block px-4 py-3 text-sm text-white/80 hover:text-white hover:bg-white/5 transition-colors"
             :class="activeSection === section.id && 'text-white font-medium border-l-2 border-sunshine'">
            <span x-text="section.label"></span>
          </a>
        </template>
      </div>
    </div>
  </nav>

  <!-- ===== SEKSJON: HERO ===== -->
  <header class="bg-petrol text-white relative overflow-hidden">
    <div class="absolute top-0 right-0 w-96 h-96 bg-sunshine/10 rounded-full -translate-y-1/2 translate-x-1/3 blur-3xl"></div>
    <div class="absolute bottom-0 left-0 w-72 h-72 bg-petrol/50 rounded-full translate-y-1/2 -translate-x-1/4 blur-3xl"></div>

    <div class="relative max-w-3xl mx-auto px-6 pt-16 pb-12">
      <p class="inline-block bg-sunshine/20 text-sunshine text-xs font-semibold tracking-widest uppercase px-3 py-1.5 rounded mb-6">Sommerferie 2026</p>
      <h1 class="font-heading text-4xl sm:text-5xl lg:text-6xl font-bold leading-tight mb-4">
        Fra <span class="text-sunshine">Kongsberg</span><br class="sm:hidden"> til Europa og tilbake
      </h1>
      <p class="text-white/60 text-base sm:text-lg font-light">3,5 uker &middot; Campingvogn &middot; 2 voksne + 1 barn &middot; Juli 2026</p>
    </div>

    <!-- Stats-bar -->
    <div class="bg-sunshine/90 text-petrol">
      <div class="max-w-3xl mx-auto grid grid-cols-4 divide-x divide-petrol/10">
        <div class="py-4 text-center">
          <span class="font-heading text-2xl sm:text-3xl font-bold block" x-text="totalWeeks">4</span>
          <span class="text-[10px] sm:text-xs uppercase tracking-wider font-medium opacity-80">Uker</span>
        </div>
        <div class="py-4 text-center">
          <span class="font-heading text-2xl sm:text-3xl font-bold block" x-text="totalCountries">4</span>
          <span class="text-[10px] sm:text-xs uppercase tracking-wider font-medium opacity-80">Land</span>
        </div>
        <div class="py-4 text-center">
          <span class="font-heading text-2xl sm:text-3xl font-bold block">~1 870</span>
          <span class="text-[10px] sm:text-xs uppercase tracking-wider font-medium opacity-80">Km</span>
        </div>
        <div class="py-4 text-center">
          <span class="font-heading text-2xl sm:text-3xl font-bold block" x-text="stops.length">8</span>
          <span class="text-[10px] sm:text-xs uppercase tracking-wider font-medium opacity-80">Stopp</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== SEKSJON: KART ===== -->
  <section id="kart" class="py-12 sm:py-16">
    <div class="max-w-5xl mx-auto px-4 sm:px-6">
      <h2 class="font-heading text-2xl sm:text-3xl text-petrol mb-6">Rutekart</h2>
      <div id="map" class="w-full h-[40vh] sm:h-[55vh] lg:h-[60vh] rounded-xl shadow-lg border border-sand/50 z-0"></div>
    </div>
  </section>

  <!-- ===== SEKSJON: REISEPLAN ===== -->
  <section id="reiseplan" class="py-12 sm:py-16 bg-sand/30">
    <div class="max-w-3xl mx-auto px-4 sm:px-6">
      <h2 class="font-heading text-2xl sm:text-3xl text-petrol mb-8">Reiseplan</h2>

      <!-- "I dag"-kort -->
      <div class="mb-8 rounded-xl overflow-hidden shadow-md border-2 border-sunshine/50"
           :class="todayStatus === 'during' ? 'bg-sunshine/10' : 'bg-white'">
        <div class="px-6 py-5">
          <!-- For avreise -->
          <template x-if="todayStatus === 'before'">
            <div class="text-center">
              <p class="text-sm text-muted uppercase tracking-wider font-medium mb-1">Nedtelling</p>
              <p class="font-heading text-3xl sm:text-4xl text-petrol font-bold" x-text="daysUntilDeparture + ' dager'"></p>
              <p class="text-sm text-charcoal/70 mt-1">til avreise fra Kongsberg</p>
            </div>
          </template>
          <!-- Under tur -->
          <template x-if="todayStatus === 'during'">
            <div>
              <p class="text-xs text-sunshine font-semibold uppercase tracking-wider mb-2">I dag</p>
              <p class="font-heading text-xl sm:text-2xl text-petrol font-bold" x-text="'Dere er i ' + currentStop.name"></p>
              <p class="text-sm text-charcoal/70 mt-1" x-text="currentStop.description"></p>
              <div class="mt-3 flex flex-wrap gap-2" x-show="nextDrive">
                <span class="inline-flex items-center gap-1.5 text-xs bg-petrol/10 text-petrol px-3 py-1 rounded-full font-medium">
                  <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
                  <span x-text="'Neste etappe: ' + nextDrive.km + ' km, ' + nextDrive.hours"></span>
                </span>
              </div>
            </div>
          </template>
          <!-- Etter tur -->
          <template x-if="todayStatus === 'after'">
            <div class="text-center">
              <p class="text-sm text-muted uppercase tracking-wider font-medium mb-1">Status</p>
              <p class="font-heading text-2xl text-petrol font-bold">Ferien er over</p>
              <p class="text-sm text-charcoal/70 mt-1">Vel hjem!</p>
            </div>
          </template>
        </div>
      </div>

      <!-- Stoppkort -->
      <div class="space-y-1">
        <template x-for="stop in stops" :key="stop.id">
          <div>
            <!-- Kjøreetappe (mellom stopp) -->
            <div x-show="stop.driveFromPrevious && stop.driveFromPrevious.km > 0"
                 class="flex items-center gap-2 px-4 py-2 text-xs text-petrol/60">
              <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
              </svg>
              <span class="font-medium text-petrol/80" x-text="stop.driveFromPrevious.km + ' km'"></span>
              <span>&middot;</span>
              <span x-text="stop.driveFromPrevious.hours"></span>
              <span class="hidden sm:inline">&middot;</span>
              <span class="hidden sm:inline truncate" x-text="stop.driveFromPrevious.route"></span>
            </div>

            <!-- Stopp-kort -->
            <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-sand/50 transition-shadow hover:shadow-md">
              <!-- Header (klikkbar) -->
              <div @click="expandedStop = expandedStop === stop.id ? null : stop.id"
                   class="w-full flex items-center gap-4 px-5 py-4 text-left transition-colors hover:bg-cream/50 cursor-pointer">
                <div class="w-8 h-8 rounded-full bg-petrol text-white flex items-center justify-center text-sm font-bold flex-shrink-0"
                     x-text="stop.id"></div>
                <div class="flex-1 min-w-0">
                  <h3 class="font-semibold text-sm sm:text-base text-charcoal" x-text="stop.name"></h3>
                  <p class="text-xs text-muted mt-0.5"
                     x-text="stop.isHome ? formatDate(stop.arrivalDate) + ' \u00b7 Hjemme\u0021' : formatDate(stop.arrivalDate) + ' \u2013 ' + formatDate(stop.departureDate) + ' \u00b7 ' + stop.nights + (stop.nights === 1 ? ' natt' : ' netter')"></p>
                </div>
                <div class="flex items-center gap-2 flex-shrink-0">
                  <span class="text-xs font-medium text-muted hidden sm:inline" x-text="stop.countryCode"></span>
                  <a :href="getMapsUrl(stop)" @click.stop target="_blank" rel="noopener"
                     class="p-1.5 rounded-lg text-muted hover:text-petrol hover:bg-cream/80 transition-colors"
                     title="Naviger i Google Maps">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                         stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
                      <path stroke-linecap="round" stroke-linejoin="round"
                            d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
                    </svg>
                  </a>
                  <svg class="w-5 h-5 text-muted transition-transform duration-200"
                       :class="expandedStop === stop.id && 'rotate-180'"
                       fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                  </svg>
                </div>
              </div>

              <!-- Innhold (ekspanderbart) -->
              <div x-show="expandedStop === stop.id"
                   x-transition:enter="transition ease-out duration-200"
                   x-transition:enter-start="opacity-0 -translate-y-2"
                   x-transition:enter-end="opacity-100 translate-y-0"
                   x-transition:leave="transition ease-in duration-150"
                   x-transition:leave-start="opacity-100"
                   x-transition:leave-end="opacity-0"
                   class="border-t border-sand/50 px-5 py-4 space-y-4">

                <!-- Camping-info -->
                <template x-if="stop.camping">
                  <div class="px-3 py-2 bg-cream rounded-lg">
                    <p class="text-xs text-muted uppercase tracking-wider font-medium mb-1" x-text="stop.camping.label || 'Campingplass'"></p>
                    <p class="text-sm font-medium">
                      <a :href="stop.camping.url" target="_blank" rel="noopener"
                         class="text-petrol hover:underline" x-text="stop.camping.name"></a>
                    </p>
                    <p class="text-xs text-charcoal/60 mt-0.5" x-text="stop.camping.address"></p>
                  </div>
                </template>

                <!-- Beskrivelse -->
                <p class="text-sm text-charcoal/80" x-text="stop.description"></p>

                <!-- Aktiviteter -->
                <div>
                  <p class="text-xs text-muted uppercase tracking-wider font-medium mb-2">Aktiviteter</p>
                  <div class="space-y-2">
                    <template x-for="activity in stop.activities" :key="activity.name">
                      <div class="flex items-start gap-2 text-sm">
                        <span class="mt-1 w-2 h-2 rounded-full flex-shrink-0"
                              :class="activity.priority === 'must-do' ? 'bg-sunshine' : 'bg-muted/50'"></span>
                        <div class="flex-1">
                          <template x-if="activity.url">
                            <a :href="activity.url" target="_blank" rel="noopener"
                               class="font-medium hover:underline"
                               :class="activity.priority === 'must-do' ? 'text-charcoal' : 'text-charcoal/70'"
                               x-text="activity.name"></a>
                          </template>
                          <template x-if="!activity.url">
                            <span class="font-medium"
                                  :class="activity.priority === 'must-do' ? 'text-charcoal' : 'text-charcoal/70'"
                                  x-text="activity.name"></span>
                          </template>
                          <template x-if="activity.mapsQuery">
                            <a :href="getActivityMapsUrl(activity.mapsQuery)" @click.stop
                               target="_blank" rel="noopener"
                               class="inline-flex items-center justify-center w-5 h-5 ml-0.5 rounded text-muted hover:text-petrol hover:bg-cream/80 transition-colors align-middle"
                               title="Naviger i Google Maps">
                              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                   stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
                              </svg>
                            </a>
                          </template>
                          <span class="text-xs ml-1 px-1.5 py-0.5 rounded-full"
                                :class="activity.priority === 'must-do' ? 'bg-sunshine/20 text-sunshine' : 'bg-muted/10 text-muted'"
                                x-text="activity.priority === 'must-do' ? 'Must-do' : 'Nice-to-have'"></span>
                          <p class="text-xs text-charcoal/60 mt-0.5" x-text="activity.description"></p>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>

                <!-- Tips -->
                <div x-show="stop.tips.length > 0">
                  <p class="text-xs text-muted uppercase tracking-wider font-medium mb-1.5">Tips</p>
                  <ul class="space-y-1">
                    <template x-for="tip in stop.tips" :key="tip">
                      <li class="text-xs text-charcoal/60 pl-3 relative before:content-[''] before:absolute before:left-0 before:top-1.5 before:w-1 before:h-1 before:bg-muted before:rounded-full"
                          x-text="tip"></li>
                    </template>
                  </ul>
                </div>

              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- ===== SEKSJON: PAKKELISTER ===== -->
  <section id="pakkelister" class="py-12 sm:py-16">
    <div class="max-w-3xl mx-auto px-4 sm:px-6">
      <h2 class="font-heading text-2xl sm:text-3xl text-petrol mb-8">Pakkelister</h2>

      <!-- Tab-navigasjon -->
      <div class="flex flex-wrap gap-1 mb-6 bg-white rounded-xl p-1.5 border border-sand/50">
        <template x-for="tab in checklistTabs" :key="tab.id">
          <button @click="activeChecklist = tab.id"
                  class="flex-1 min-w-[100px] px-3 py-2.5 text-xs sm:text-sm font-medium rounded-lg transition-colors"
                  :class="activeChecklist === tab.id ? 'bg-petrol text-white shadow-sm' : 'text-charcoal/60 hover:bg-cream'"
                  x-text="tab.label"></button>
        </template>
      </div>

      <!-- Sjekkliste-innhold -->
      <template x-for="tab in checklistTabs" :key="tab.id">
        <div x-show="activeChecklist === tab.id" x-transition.opacity>

          <!-- Fremgangsindikator -->
          <div class="flex items-center gap-3 mb-4 px-1">
            <div class="flex-1 h-2 bg-sand/60 rounded-full overflow-hidden">
              <div class="h-full bg-success rounded-full transition-all duration-300"
                   :style="'width:' + checklistProgress(tab.id) + '%'"></div>
            </div>
            <span class="text-xs text-muted font-medium whitespace-nowrap"
                  x-text="checklistDoneCount(tab.id) + ' av ' + checklists[tab.id].length + ' fullført'"></span>
          </div>

          <!-- Sjekkliste-items -->
          <div class="bg-white rounded-xl border border-sand/50 overflow-hidden divide-y divide-sand/30">
            <template x-for="(item, idx) in checklists[tab.id]" :key="idx">
              <div>
                <!-- Kategori-header (vises kun ved forste item i ny kategori) -->
                <div x-show="idx === 0 || item.category !== checklists[tab.id][idx-1].category"
                     class="px-5 py-2.5 bg-cream/70 text-xs font-semibold text-petrol uppercase tracking-wider"
                     x-text="item.category"></div>
                <!-- Item -->
                <label class="flex items-center gap-3 px-5 py-3 cursor-pointer hover:bg-cream/30 transition-colors">
                  <input type="checkbox"
                         x-model="checklists[tab.id][idx].done"
                         @change="saveChecklists()"
                         class="w-4.5 h-4.5 rounded border-muted/40 text-success focus:ring-success/30 cursor-pointer flex-shrink-0">
                  <span class="text-sm transition-all"
                        :class="checklists[tab.id][idx].done ? 'line-through text-muted' : 'text-charcoal'"
                        x-text="item.label"></span>
                </label>
              </div>
            </template>
          </div>

          <!-- Nullstill-knapp -->
          <div class="mt-4 flex justify-end">
            <button @click="confirmReset = confirmReset === tab.id ? null : tab.id"
                    class="text-xs text-muted hover:text-red-500 transition-colors px-3 py-1.5 rounded-lg hover:bg-red-50">
              <span x-show="confirmReset !== tab.id">Nullstill liste</span>
              <span x-show="confirmReset === tab.id" class="text-red-500 font-medium"
                    @click.stop="resetChecklist(tab.id); confirmReset = null">Bekreft nullstilling</span>
            </button>
          </div>

        </div>
      </template>
    </div>
  </section>

  <!-- ===== SEKSJON: BUDSJETT & PRAKTISK ===== -->
  <section id="budsjett" class="py-12 sm:py-16 bg-sand/30">
    <div class="max-w-3xl mx-auto px-4 sm:px-6">
      <h2 class="font-heading text-2xl sm:text-3xl text-petrol mb-8">Budsjett & Praktisk</h2>

      <!-- Budsjett-grid -->
      <h3 class="font-heading text-lg text-petrol mb-4">Estimert budsjett</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-8">
        <template x-for="item in budget" :key="item.category">
          <div class="bg-white rounded-xl p-5 border border-sand/50">
            <p class="text-xs text-muted uppercase tracking-wider font-medium mb-1" x-text="item.category"></p>
            <p class="font-heading text-2xl text-charcoal">
              <span x-text="item.amount.toLocaleString('no-NO')"></span>
              <span class="text-sm text-muted font-body ml-1">NOK</span>
            </p>
            <div class="mt-3 h-1.5 bg-sand/50 rounded-full overflow-hidden">
              <div class="h-full rounded-full transition-all duration-500"
                   :class="item.color"
                   :style="'width:' + Math.round(item.amount / budgetTotal * 100) + '%'"></div>
            </div>
          </div>
        </template>
      </div>
      <div class="bg-petrol text-white rounded-xl p-5 mb-10 flex items-center justify-between">
        <span class="font-medium">Totalt estimert</span>
        <span class="font-heading text-2xl" x-text="budgetTotal.toLocaleString('no-NO') + ' NOK'"></span>
      </div>

      <!-- Valutatabell -->
      <h3 class="font-heading text-lg text-petrol mb-4">Valutakurser</h3>
      <div class="bg-white rounded-xl border border-sand/50 overflow-hidden mb-8">
        <table class="w-full text-sm">
          <thead class="bg-cream/70">
            <tr>
              <th class="text-left px-5 py-3 text-xs text-petrol uppercase tracking-wider font-semibold">Valuta</th>
              <th class="text-right px-5 py-3 text-xs text-petrol uppercase tracking-wider font-semibold">Kurs</th>
              <th class="text-right px-5 py-3 text-xs text-petrol uppercase tracking-wider font-semibold">100 NOK =</th>
